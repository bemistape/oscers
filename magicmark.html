<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Mark Prokfsh</title>
  <style>
    :root {
      --bg0: #070605;
      --bg1: #100d0a;
      --bg2: #18130d;
      --panel: rgba(17, 13, 10, 0.94);
      --gold: #d4ae4f;
      --gold-soft: rgba(212, 174, 79, 0.34);
      --gold-faint: rgba(212, 174, 79, 0.14);
      --text: #f2e2b2;
      --switch-off-0: #2a241b;
      --switch-off-1: #17120e;
      --switch-on-0: #5f3513;
      --switch-on-1: #29170d;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(230, 186, 86, 0.12), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(119, 27, 16, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 56%, var(--bg0) 100%);
    }

    main {
      max-width: 1540px;
      margin: 0 auto;
      padding: 28px 16px 36px;
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
      color: #e0ba5d;
      font-size: clamp(1.9rem, 4.1vw, 3.25rem);
      line-height: 1.04;
      text-transform: uppercase;
      letter-spacing: 0.028em;
      text-shadow: 0 12px 28px rgba(0,0,0,0.45);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--gold-soft);
      border-radius: 24px;
      box-shadow:
        0 28px 56px rgba(0,0,0,0.42),
        inset 0 0 0 1px rgba(255,255,255,0.02);
      padding: 14px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 4px 8px 14px;
      flex-wrap: wrap;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      user-select: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text);
      font-size: 0.98rem;
    }

    .toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 78px;
      height: 40px;
      flex: 0 0 auto;
    }

    .track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 1px solid var(--gold-soft);
      background: linear-gradient(180deg, var(--switch-off-0), var(--switch-off-1));
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.35),
        0 0 0 1px rgba(255,255,255,0.03);
      transition: background 150ms ease, border-color 150ms ease;
    }

    .track::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(180deg, #f8e09b, #c99922);
      box-shadow:
        0 6px 12px rgba(0,0,0,0.36),
        inset 0 1px 1px rgba(255,255,255,0.44);
      transition: transform 150ms ease;
    }

    .toggle input:checked + .track {
      background: linear-gradient(180deg, var(--switch-on-0), var(--switch-on-1));
      border-color: rgba(212, 174, 79, 0.58);
    }

    .toggle input:checked + .track::after {
      transform: translateX(38px);

      background: #0d0907;
    }

    canvas {

      width: 100%;
      height: auto;
      aspect-ratio: 18 / 11;
      touch-action: none;
      cursor: grab;
    }

    canvas.dragging { cursor: grabbing; }

    @media (max-width: 720px) {
      main { padding: 20px 10px 26px; }
      h1 { margin-bottom: 14px; }
      .toggle { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Explore Your Imagination with Magic Mark Prokfsh</h1>

    <section class="panel">
      <div class="toolbar">
        <label class="toggle" for="relaxToggle">
          <span>Relax, Mark</span>
          <span class="switch">
            <input id="relaxToggle" type="checkbox" aria-label="Relax, Mark" />
            <span class="track"></span>
          </span>
        </label>
      </div>

      <div class="canvas-wrap">
        <canvas id="scene" width="1800" height="1100" aria-label="Magic Mark interactive scene"></canvas>
      </div>
    </section>
  </main>

  <script>
  (() => {
    "use strict";

    const SCENE = {
      width: 1800,
      height: 1100,
      groundY: 918,
      margin: 72
    };

    const PHYSICS = {
      gravity: 0.72,
      damping: 0.045,
      bounce: 0.16,
      stretchIterations: 18,
      poseIterations: 22,
      dragVelocityScale: 17,
      dragImpulse: 0.92,
      stretchSpring: 0.028,
      stretchSpringHeavy: 0.036,
      poseSpring: 0.34,
      supportStiffness: 0.42,
      boneStiffness: 0.9
    };

    const INTERACTION = {
      handleRadius: 54,
      doubleTapMs: 320,
      tapDistance: 18
    };

    const VISUAL = {
      headRadius: 62,
      chestWidth: 128,
      waistWidth: 84,
      pelvisWidth: 98,
      upperArmA: 26,
      upperArmB: 22,
      forearmA: 21,
      forearmB: 17,
      thighA: 37,
      thighB: 29,
      calfA: 27,
      calfB: 19,
      neckA: 26,
      neckB: 22,
      skinLight: "#edd5c3",
      skinBase: "#dbb79f",
      skinMid: "#c79d84",
      skinDark: "#ad7f67",
      line: "rgba(60, 40, 31, 0.68)",
      hair: "rgba(72, 52, 39, 0.52)",
      glasses: "#1a1a1a",
      eyeWhite: "#f3eee8",
      iris: "#8ea165",
      lip: "#9f6f66",
      sceneLine: "rgba(212, 174, 79, 0.14)"
    };

    const POSE = {
      pelvis: [0, -438],
      waist: [0, -520],
      chest: [0, -618],
      neck: [0, -690],
      head: [0, -784],

      shoulderL: [-74, -626],
      elbowL: [-144, -506],
      wristL: [-160, -380],

      shoulderR: [74, -626],
      elbowR: [144, -506],
      wristR: [160, -380],

      hipL: [-46, -430],
      kneeL: [-42, -236],
      ankleL: [-34, -56],
      toeL: [-25, 0],

      hipR: [46, -430],
      kneeR: [42, -236],
      ankleR: [34, -56],
      toeR: [25, 0]
    };

    const BONE_DEFS = [
      ["pelvis", "waist", PHYSICS.boneStiffness],
      ["waist", "chest", PHYSICS.boneStiffness],
      ["chest", "neck", PHYSICS.boneStiffness],
      ["neck", "head", PHYSICS.boneStiffness],

      ["chest", "shoulderL", PHYSICS.boneStiffness],
      ["shoulderL", "elbowL", PHYSICS.boneStiffness],
      ["elbowL", "wristL", PHYSICS.boneStiffness],

      ["chest", "shoulderR", PHYSICS.boneStiffness],
      ["shoulderR", "elbowR", PHYSICS.boneStiffness],
      ["elbowR", "wristR", PHYSICS.boneStiffness],

      ["pelvis", "hipL", PHYSICS.boneStiffness],
      ["hipL", "kneeL", PHYSICS.boneStiffness],
      ["kneeL", "ankleL", PHYSICS.boneStiffness],
      ["ankleL", "toeL", 0.76],

      ["pelvis", "hipR", PHYSICS.boneStiffness],
      ["hipR", "kneeR", PHYSICS.boneStiffness],
      ["kneeR", "ankleR", PHYSICS.boneStiffness],
      ["ankleR", "toeR", 0.76],

      ["shoulderL", "shoulderR", PHYSICS.supportStiffness],
      ["hipL", "hipR", PHYSICS.supportStiffness],
      ["shoulderL", "hipL", 0.28],
      ["shoulderR", "hipR", 0.28],
      ["shoulderL", "hipR", 0.22],
      ["shoulderR", "hipL", 0.22],
      ["waist", "hipL", 0.26],
      ["waist", "hipR", 0.26]
    ];

    const JOINT_SIDE_DEFS = [
      ["shoulderL", "elbowL", "wristL", -1, 11],
      ["shoulderR", "elbowR", "wristR", 1, 11],
      ["hipL", "kneeL", "ankleL", -1, 12],
      ["hipR", "kneeR", "ankleR", 1, 12]
    ];

    const HANDLE_IDS = [
      "head", "neck",
      "shoulderL", "elbowL", "wristL",
      "shoulderR", "elbowR", "wristR",
      "pelvis", "waist", "chest",
      "hipL", "kneeL", "ankleL", "toeL",
      "hipR", "kneeR", "ankleR", "toeR"
    ];

    const POSE_HANDLE_IDS = [
      "head", "neck",
      "shoulderL", "elbowL", "wristL",
      "shoulderR", "elbowR", "wristR",
      "hipL", "kneeL", "ankleL", "toeL",
      "hipR", "kneeR", "ankleR", "toeR"
    ];

    const SEGMENT_DRAWS = [
      ["neck", "head", VISUAL.neckA, VISUAL.neckB],
      ["shoulderL", "elbowL", VISUAL.upperArmA, VISUAL.upperArmB],
      ["elbowL", "wristL", VISUAL.forearmA, VISUAL.forearmB],
      ["shoulderR", "elbowR", VISUAL.upperArmA, VISUAL.upperArmB],
      ["elbowR", "wristR", VISUAL.forearmA, VISUAL.forearmB],
      ["hipL", "kneeL", VISUAL.thighA, VISUAL.thighB],
      ["kneeL", "ankleL", VISUAL.calfA, VISUAL.calfB],
      ["hipR", "kneeR", VISUAL.thighA, VISUAL.thighB],
      ["kneeR", "ankleR", VISUAL.calfA, VISUAL.calfB]
    ];

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const relaxToggle = document.getElementById("relaxToggle");
    if (!canvas || !ctx || !relaxToggle) return;

    const state = {
      points: {},
      targets: {},
      bones: [],
      jointSide: [],
      relaxed: false,
      dragKind: "",
      draggedId: "",
      pointerX: 0,
      pointerY: 0,
      pointerVX: 0,
      pointerVY: 0,
      lastPointerTime: 0,
      downX: 0,
      downY: 0,
      movedSinceDown: false,
      lastTapTime: 0,
      lastTapX: 0,
      lastTapY: 0,
      spawnX: SCENE.width * 0.5,
      spawnY: SCENE.groundY
    };

    function clamp(v, min, max) {
      return v < min ? min : (v > max ? max : v);
    }

    function dist(x0, y0, x1, y1) {
      return Math.hypot(x1 - x0, y1 - y0);
    }

    function createPoint(x, y) {
      return { x, y, px: x, py: y };
    }

    function segmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const denom = abx * abx + aby * aby || 1;
      let t = ((px - ax) * abx + (py - ay) * aby) / denom;
      t = t < 0 ? 0 : (t > 1 ? 1 : t);
      const dx = ax + abx * t - px;
      const dy = ay + aby * t - py;
      return Math.hypot(dx, dy);
    }

    function placeNeutralAt(anchorX, anchorY) {
      const ids = Object.keys(POSE);
      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const base = POSE[id];
        const x = anchorX + base[0];
        const y = anchorY + base[1];
        if (!state.targets[id]) {
          state.targets[id] = { x, y };
          state.points[id] = createPoint(x, y);
        } else {
          state.targets[id].x = x;
          state.targets[id].y = y;
          state.points[id].x = x;
          state.points[id].y = y;
          state.points[id].px = x;
          state.points[id].py = y;
        }
      }
    }

    function buildBones() {
      state.bones.length = 0;
      for (let i = 0; i < BONE_DEFS.length; i++) {
        const def = BONE_DEFS[i];
        const a = state.targets[def[0]];
        const b = state.targets[def[1]];
        state.bones.push({
          a: def[0],
          b: def[1],
          rest: dist(a.x, a.y, b.x, b.y),
          stiffness: def[2]
        });
      }
    }

    function buildJointSideConstraints() {
      state.jointSide.length = 0;
      for (let i = 0; i < JOINT_SIDE_DEFS.length; i++) {
        const def = JOINT_SIDE_DEFS[i];
        state.jointSide.push({
          a: def[0],
          b: def[1],
          c: def[2],
          sign: def[3],
          offset: def[4]
        });
      }
    }

    function captureTargetsFromPoints() {
      const ids = Object.keys(state.points);
      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const p = state.points[id];
        state.targets[id].x = p.x;
        state.targets[id].y = p.y;
      }
    }

    function zeroVelocities() {
      const ids = Object.keys(state.points);
      for (let i = 0; i < ids.length; i++) {
        const p = state.points[ids[i]];
        p.px = p.x;
        p.py = p.y;
      }
    }

    function figureBounds() {
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      const ids = Object.keys(state.points);
      for (let i = 0; i < ids.length; i++) {
        const p = state.points[ids[i]];
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
      return { minX, minY, maxX, maxY };
    }

    function clampWholeFigureIntoScene() {
      const b = figureBounds();
      let dx = 0;
      let dy = 0;
      if (b.minX < SCENE.margin) dx = SCENE.margin - b.minX;
      else if (b.maxX > SCENE.width - SCENE.margin) dx = (SCENE.width - SCENE.margin) - b.maxX;
      if (b.minY < 80) dy = 80 - b.minY;
      else if (b.maxY > SCENE.height - 50) dy = (SCENE.height - 50) - b.maxY;
      if (dx || dy) translateFigure(dx, dy);
    }

    function translateFigure(dx, dy) {
      const ids = Object.keys(state.points);
      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const p = state.points[id];
        const t = state.targets[id];
        p.x += dx;
        p.y += dy;
        p.px += dx;
        p.py += dy;
        t.x += dx;
        t.y += dy;
      }
    }

    function setMode(relaxed) {
      state.relaxed = relaxed;
      state.dragKind = "";
      state.draggedId = "";
      captureTargetsFromPoints();
      zeroVelocities();
      canvas.classList.remove("dragging");
    }

    function resetSpawn() {
      placeNeutralAt(state.spawnX, state.spawnY);
      buildBones();
      zeroVelocities();
      state.dragKind = "";
      state.draggedId = "";
      canvas.classList.remove("dragging");
    }

    function averageToe() {
      const l = state.points.toeL;
      const r = state.points.toeR;
      return { x: (l.x + r.x) * 0.5, y: (l.y + r.y) * 0.5 };
    }

    function headTilt() {
      const neck = state.points.neck;
      const head = state.points.head;
      return clamp(Math.atan2(head.y - neck.y, head.x - neck.x) - Math.PI * 0.5, -0.4, 0.4);
    }

    function torsoHit(px, py) {
      const chest = state.points.chest;
      const waist = state.points.waist;
      const pelvis = state.points.pelvis;
      const shoulderL = state.points.shoulderL;
      const shoulderR = state.points.shoulderR;
      const hipL = state.points.hipL;
      const hipR = state.points.hipR;
      const minX = Math.min(shoulderL.x, hipL.x) - 50;
      const maxX = Math.max(shoulderR.x, hipR.x) + 50;
      const minY = chest.y - 50;
      const maxY = pelvis.y + 76;
      if (px < minX || px > maxX || py < minY || py > maxY) return false;
      return Math.abs(px - chest.x) < 110 && py >= minY && py <= maxY;
    }

    function headHit(px, py) {
      const h = state.points.head;
      const tilt = headTilt();
      const dx0 = px - h.x;
      const dy0 = py - h.y;
      const c = Math.cos(-tilt);
      const s = Math.sin(-tilt);
      const dx = dx0 * c - dy0 * s;
      const dy = dx0 * s + dy0 * c;
      const rx = VISUAL.headRadius * 0.88;
      const ry = VISUAL.headRadius * 1.05;
      return (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry) <= 1.06;
    }

    function figureHit(px, py) {
      if (headHit(px, py) || torsoHit(px, py)) return true;
      for (let i = 0; i < SEGMENT_DRAWS.length; i++) {
        const def = SEGMENT_DRAWS[i];
        const a = state.points[def[0]];
        const b = state.points[def[1]];
        const radius = Math.max(def[2], def[3]) * 0.72;
        if (segmentDistance(px, py, a.x, a.y, b.x, b.y) <= radius) return true;
      }
      return false;
    }

    function nearestHandle(px, py, relaxedMode) {
      const ids = relaxedMode ? POSE_HANDLE_IDS : HANDLE_IDS;
      let bestId = "";
      let best = INTERACTION.handleRadius;
      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const p = state.points[id];
        const d = dist(px, py, p.x, p.y);
        if (d < best) {
          best = d;
          bestId = id;
        }
      }
      return bestId;
    }

    function applyBoneConstraint(bone) {
      const a = state.points[bone.a];
      const b = state.points[bone.b];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const d = Math.hypot(dx, dy) || 0.0001;
      const delta = (d - bone.rest) / d;
      const ox = dx * 0.5 * delta * bone.stiffness;
      const oy = dy * 0.5 * delta * bone.stiffness;

      if ((state.dragKind === "pose" || state.dragKind === "stretch") && state.draggedId === bone.a) {
        b.x -= ox * 2;
        b.y -= oy * 2;
        return;
      }
      if ((state.dragKind === "pose" || state.dragKind === "stretch") && state.draggedId === bone.b) {
        a.x += ox * 2;
        a.y += oy * 2;
        return;
      }

      a.x += ox;
      a.y += oy;
      b.x -= ox;
      b.y -= oy;
    }

    function applyJointSideConstraint(rule) {
      const a = state.points[rule.a];
      const b = state.points[rule.b];
      const c = state.points[rule.c];

      const acx = c.x - a.x;
      const acy = c.y - a.y;
      const len = Math.hypot(acx, acy) || 1;
      const nx = -acy / len;
      const ny = acx / len;
      const signed = ((b.x - a.x) * nx + (b.y - a.y) * ny);
      const desired = rule.offset * rule.sign;

      if (signed * rule.sign < rule.offset) {
        const push = desired - signed;
        b.x += nx * push * 0.92;
        b.y += ny * push * 0.92;
      }
    }

    function applyTargetSpring(id, strength) {
      if (state.draggedId === id && (state.dragKind === "pose" || state.dragKind === "stretch")) return;
      const p = state.points[id];
      const t = state.targets[id];
      p.x += (t.x - p.x) * strength;
      p.y += (t.y - p.y) * strength;
    }

    function pinDraggedPoint() {
      if (!state.draggedId) return;
      const p = state.points[state.draggedId];
      p.x = state.pointerX;
      p.y = state.pointerY;
      p.px = p.x - state.pointerVX * 0.16;
      p.py = p.y - state.pointerVY * 0.16;
    }

    function applySceneBounds(withGround) {
      const ids = Object.keys(state.points);
      for (let i = 0; i < ids.length; i++) {
        const p = state.points[ids[i]];
        if (p.x < SCENE.margin) {
          p.x = SCENE.margin;
          p.px = p.x;
        } else if (p.x > SCENE.width - SCENE.margin) {
          p.x = SCENE.width - SCENE.margin;
          p.px = p.x;
        }

        if (p.y < 58) {
          p.y = 58;
          p.py = p.y;
        } else if (!withGround && p.y > SCENE.height - 38) {
          p.y = SCENE.height - 38;
          p.py = p.y;
        }

        if (withGround && p.y > SCENE.groundY) {
          const vy = p.y - p.py;
          const vx = p.x - p.px;
          p.y = SCENE.groundY;
          p.py = p.y + vy * -PHYSICS.bounce;
          p.px = p.x - vx * 0.56;
        }
      }
    }

    function stepStretch() {
      const ids = Object.keys(state.points);
      const damping = 1 - PHYSICS.damping;

      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        if (state.dragKind === "stretch" && state.draggedId === id) continue;
        const p = state.points[id];
        const vx = (p.x - p.px) * damping;
        const vy = (p.y - p.py) * damping + PHYSICS.gravity;
        p.px = p.x;
        p.py = p.y;
        p.x += vx;
        p.y += vy;
      }

      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const heavy = (id === "pelvis" || id === "waist" || id === "chest");
        applyTargetSpring(id, heavy ? PHYSICS.stretchSpringHeavy : PHYSICS.stretchSpring);
      }

      if (state.dragKind === "stretch") pinDraggedPoint();

      for (let iter = 0; iter < PHYSICS.stretchIterations; iter++) {
        for (let i = 0; i < state.bones.length; i++) applyBoneConstraint(state.bones[i]);
        for (let i = 0; i < state.jointSide.length; i++) applyJointSideConstraint(state.jointSide[i]);
        if (state.dragKind === "stretch") pinDraggedPoint();
        applySceneBounds(true);
      }
    }

    function stepRelaxed() {
      const ids = Object.keys(state.points);

      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        if (state.dragKind === "pose" && state.draggedId === id) continue;
        const p = state.points[id];
        const t = state.targets[id];
        p.x += (t.x - p.x) * PHYSICS.poseSpring;
        p.y += (t.y - p.y) * PHYSICS.poseSpring;
        p.px = p.x;
        p.py = p.y;
      }

      if (state.dragKind === "pose") pinDraggedPoint();

      for (let iter = 0; iter < PHYSICS.poseIterations; iter++) {
        for (let i = 0; i < state.bones.length; i++) applyBoneConstraint(state.bones[i]);
        for (let i = 0; i < state.jointSide.length; i++) applyJointSideConstraint(state.jointSide[i]);
        if (state.dragKind === "pose") pinDraggedPoint();
        applySceneBounds(false);
      }

      if (state.dragKind === "pose") captureTargetsFromPoints();
    }

    function drawTaperedSegment(aId, bId, w0, w1) {
      const a = state.points[aId];
      const b = state.points[bId];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len;
      const ny = dx / len;
      const hw0 = w0 * 0.5;
      const hw1 = w1 * 0.5;

      const fill = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      fill.addColorStop(0, VISUAL.skinLight);
      fill.addColorStop(0.5, VISUAL.skinBase);
      fill.addColorStop(1, VISUAL.skinMid);

      ctx.beginPath();
      ctx.moveTo(a.x + nx * hw0, a.y + ny * hw0);
      ctx.lineTo(b.x + nx * hw1, b.y + ny * hw1);
      ctx.quadraticCurveTo(b.x + dx * 0.03, b.y + dy * 0.03, b.x - nx * hw1, b.y - ny * hw1);
      ctx.lineTo(a.x - nx * hw0, a.y - ny * hw0);
      ctx.quadraticCurveTo(a.x - dx * 0.03, a.y - dy * 0.03, a.x + nx * hw0, a.y + ny * hw0);
      ctx.closePath();

      ctx.fillStyle = fill;
      ctx.strokeStyle = VISUAL.line;
      ctx.lineWidth = 1.4;
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = Math.max(1.8, Math.min(w0, w1) * 0.11);
      ctx.beginPath();
      ctx.moveTo(a.x + nx * hw0 * 0.28, a.y + ny * hw0 * 0.28);
      ctx.quadraticCurveTo((a.x + b.x) * 0.5 + nx * 4, (a.y + b.y) * 0.5 + ny * 4, b.x + nx * hw1 * 0.22, b.y + ny * hw1 * 0.22);
      ctx.stroke();
    }

    function drawHairLineAlongSegment(aId, bId, count, size, alpha) {
      const a = state.points[aId];
      const b = state.points[bId];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len;
      const ny = dx / len;
      ctx.strokeStyle = "rgba(70, 51, 38," + alpha + ")";
      ctx.lineWidth = 1.05;
      ctx.lineCap = "round";
      for (let i = 1; i <= count; i++) {
        const t = i / (count + 1);
        const px = a.x + dx * t;
        const py = a.y + dy * t;
        const dir = (i & 1) ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + nx * size * dir, py + ny * size * dir);
        ctx.stroke();
      }
    }

      const fingerY = [-8.5, -3.4, 1.6, 6.8];

      ctx.beginPath();

      ctx.lineTo(14, 15 * flip);

      ctx.fillStyle = "#212121";

      ctx.arc(-eyeGap + 1, eyeY, r * 0.016, 0, Math.PI * 2);
      ctx.arc(eyeGap + 1, eyeY + 1, r * 0.016, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.66)";
      ctx.beginPath();
      ctx.arc(-eyeGap - 1.5, eyeY - 2, r * 0.010, 0, Math.PI * 2);

      ctx.quadraticCurveTo(-r * 0.18, r * 0.46, -r * 0.13, r * 0.56);
      ctx.moveTo(r * 0.24, r * 0.22);

      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(-r * 0.06, eyeY + r * 0.56);

      ctx.strokeStyle = VISUAL.lip;

      ctx.beginPath();
      ctx.moveTo(-r * 0.19, r * 0.45);
      ctx.quadraticCurveTo(-r * 0.06, r * 0.5, 0, r * 0.48);
      ctx.quadraticCurveTo(r * 0.07, r * 0.49, r * 0.2, r * 0.44);

      ctx.moveTo(-r * 0.08, eyeY);
      ctx.lineTo(r * 0.08, eyeY);
      ctx.stroke();

      ctx.strokeStyle = "rgba(27,27,27,0.6)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-eyeGap - frameW * 0.5, eyeY + 3);
      ctx.lineTo(-r * 0.86, eyeY + 9);
      ctx.moveTo(eyeGap + frameW * 0.5, eyeY + 3);
      ctx.lineTo(r * 0.86, eyeY + 10);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(-eyeGap - frameW * 0.5 + 4, eyeY - frameH * 0.5 + 4, frameW * 0.34, frameH * 0.18);
      ctx.fillRect(eyeGap - frameW * 0.5 + 4, eyeY - frameH * 0.5 + 4, frameW * 0.34, frameH * 0.18);

      ctx.fillStyle = "rgba(80, 58, 46, 0.08)";
      ctx.beginPath();
      ctx.ellipse(0, r * 0.7, r * 0.28, r * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFigure() {
      drawShadow();

      for (let i = 0; i < SEGMENT_DRAWS.length; i++) {
        const def = SEGMENT_DRAWS[i];
        if (def[0] === "neck") continue;
        drawTaperedSegment(def[0], def[1], def[2], def[3]);
      }

      drawHairLineAlongSegment("shoulderL", "wristL", 9, 4.2, 0.46);
      drawHairLineAlongSegment("shoulderR", "wristR", 9, 4.2, 0.46);
      drawHairLineAlongSegment("hipL", "ankleL", 14, 4.0, 0.52);
      drawHairLineAlongSegment("hipR", "ankleR", 14, 4.0, 0.52);

      drawTorso();
      drawTaperedSegment("neck", "head", VISUAL.neckA, VISUAL.neckB);
      drawHandsAndFeet();
      drawHead();
    }

    function render() {
      drawBackground();
      drawFigure();
    }

    function getPointer(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (evt.clientX - rect.left) * (canvas.width / rect.width),
        y: (evt.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function maybeResetTap(x, y) {
      const now = performance.now();
      if (!state.movedSinceDown && now - state.lastTapTime <= INTERACTION.doubleTapMs) {
        if (dist(x, y, state.lastTapX, state.lastTapY) <= INTERACTION.tapDistance) {
          resetSpawn();
          state.lastTapTime = 0;
          return;
        }
      }
      state.lastTapTime = now;
      state.lastTapX = x;
      state.lastTapY = y;
    }

    function onPointerDown(evt) {
      evt.preventDefault();
      const p = getPointer(evt);
      state.pointerX = p.x;
      state.pointerY = p.y;
      state.pointerVX = 0;
      state.pointerVY = 0;
      state.lastPointerTime = performance.now();
      state.downX = p.x;
      state.downY = p.y;
      state.movedSinceDown = false;

      if (state.relaxed) {
        const handle = nearestHandle(p.x, p.y, true);
        if (handle) {
          state.dragKind = "pose";
          state.draggedId = handle;
        } else if (torsoHit(p.x, p.y) || figureHit(p.x, p.y)) {
          state.dragKind = "figure";
          state.draggedId = "";
        } else {
          return;
        }
      } else {
        const handle = nearestHandle(p.x, p.y, false);
        if (!handle) return;
        state.dragKind = "stretch";
        state.draggedId = handle;
      }

      canvas.classList.add("dragging");
      canvas.setPointerCapture(evt.pointerId);
    }

    function onPointerMove(evt) {
      const p = getPointer(evt);
      const now = performance.now();
      const dt = Math.max(8, now - state.lastPointerTime);

      if (Math.abs(p.x - state.downX) > INTERACTION.tapDistance || Math.abs(p.y - state.downY) > INTERACTION.tapDistance) {
        state.movedSinceDown = true;
      }

      state.pointerVX = ((p.x - state.pointerX) / dt) * PHYSICS.dragVelocityScale;
      state.pointerVY = ((p.y - state.pointerY) / dt) * PHYSICS.dragVelocityScale;

      if (state.dragKind === "figure") {
        const dx = p.x - state.pointerX;
        const dy = p.y - state.pointerY;
        translateFigure(dx, dy);
        clampWholeFigureIntoScene();
        state.pointerX = p.x;
        state.pointerY = p.y;
        state.lastPointerTime = now;
        return;
      }

      state.pointerX = p.x;
      state.pointerY = p.y;
      state.lastPointerTime = now;
    }

    function onPointerUp(evt) {
      const up = getPointer(evt);

      if (state.dragKind === "stretch" && state.draggedId) {
        const p = state.points[state.draggedId];
        p.px = p.x - state.pointerVX * PHYSICS.dragImpulse;
        p.py = p.y - state.pointerVY * PHYSICS.dragImpulse;
      } else if (state.dragKind === "pose") {
        captureTargetsFromPoints();
        zeroVelocities();
      }

      maybeResetTap(up.x, up.y);

      state.dragKind = "";
      state.draggedId = "";
      canvas.classList.remove("dragging");

      if (canvas.hasPointerCapture(evt.pointerId)) {
        canvas.releasePointerCapture(evt.pointerId);
      }
    }

    function onPointerCancel(evt) {
      state.dragKind = "";
      state.draggedId = "";
      canvas.classList.remove("dragging");
      if (canvas.hasPointerCapture(evt.pointerId)) {
        canvas.releasePointerCapture(evt.pointerId);
      }
    }

    function animate() {
      step();
      render();
      requestAnimationFrame(animate);
    }

    placeNeutralAt(state.spawnX, state.spawnY);
    buildBones();
    buildJointSideConstraints();
    render();

    canvas.addEventListener("pointerdown", onPointerDown, { passive: false });
    canvas.addEventListener("pointermove", onPointerMove, { passive: false });
    canvas.addEventListener("pointerup", onPointerUp, { passive: false });
    canvas.addEventListener("pointercancel", onPointerCancel, { passive: false });
    canvas.addEventListener("dblclick", resetSpawn);
    relaxToggle.addEventListener("change", () => setMode(relaxToggle.checked));

    animate();
  })();
  </script>
</body>
</html>
